# Render Blueprint — Root Directory: backend
services:
  - type: web
    name: document-extraction-api
    runtime: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements-render.txt && python scripts/cache_paddle_models.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: OCR_LOW_MEMORY
        value: "true"
      - key: OCR_WARMUP_ON_STARTUP
        value: "false"
      - key: MONGO_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://document-extraction-ultrion.vercel.app
      - key: CORS_ORIGINS
        value: https://document-extraction-ultrion.vercel.app
      - key: OPENAI_MODEL
        value: gpt-4o
